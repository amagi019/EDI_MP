{# 発注進捗パイプライン — インクルード用 #}
<div style="margin-top: 2.5rem;">
  <div class="card" style="padding: 1rem 1.2rem;">
    <div style="display:flex;align-items:center;gap:0.8rem;margin-bottom:0.8rem;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:0.4rem;flex-shrink:0;">
        <div style="width:4px;height:20px;background:linear-gradient(135deg,#10B981,#059669);border-radius:2px;"></div>
        <h3 style="margin:0;font-size:1rem;font-family:'Outfit',sans-serif;color:#10B981;">📊 発注進捗</h3>
      </div>
      <select id="pl-filter-partner" onchange="filterPL()" style="background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-main);border-radius:6px;padding:0.3rem 0.5rem;font-size:0.75rem;height:28px;max-width:140px;">
        <option value="">全パートナー</option>
        {% for pname in partner_list %}<option value="{{ pname }}">{{ pname }}</option>{% endfor %}
      </select>
      <select id="pl-filter-month" onchange="filterPL()" style="background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-main);border-radius:6px;padding:0.3rem 0.5rem;font-size:0.75rem;height:28px;max-width:100px;">
        <option value="">全期間</option>
      </select>
      <div style="display:flex;gap:1px;height:28px;">
        <button type="button" onclick="setStF('pending')" class="pl-sb pl-sb-on" data-s="pending" style="background:rgba(129,140,248,0.15);border:none;color:#818CF8;padding:0 0.5rem;border-radius:4px 0 0 4px;font-size:0.7rem;cursor:pointer;height:28px;line-height:28px;">未完了</button>
        <button type="button" onclick="setStF('overdue')" class="pl-sb" data-s="overdue" style="background:rgba(239,68,68,0.15);border:none;color:#EF4444;padding:0 0.5rem;font-size:0.7rem;cursor:pointer;height:28px;line-height:28px;">遅延</button>
        <button type="button" onclick="setStF('active')" class="pl-sb" data-s="active" style="background:rgba(245,158,11,0.15);border:none;color:#F59E0B;padding:0 0.5rem;font-size:0.7rem;cursor:pointer;height:28px;line-height:28px;">進行中</button>
        <button type="button" onclick="setStF('done')" class="pl-sb" data-s="done" style="background:rgba(16,185,129,0.15);border:none;color:#10B981;padding:0 0.5rem;font-size:0.7rem;cursor:pointer;height:28px;line-height:28px;">完了</button>
        <button type="button" onclick="setStF('')" class="pl-sb" data-s="" style="background:rgba(148,163,184,0.2);border:none;color:#94A3B8;padding:0 0.5rem;border-radius:0 4px 4px 0;font-size:0.7rem;cursor:pointer;height:28px;line-height:28px;">全て</button>
      </div>
      <div style="display:flex;gap:0.5rem;font-size:0.6rem;color:var(--text-dim);margin-left:auto;align-items:center;height:28px;">
        <span>🟢完了</span><span>🟡進行中</span><span>🔴遅延</span><span>⚪未着手</span><span style="color:#60A5FA;">■自社</span><span style="color:#A78BFA;">■パートナー</span>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:0.8rem;table-layout:fixed;">
        <colgroup>
          <col style="width:100px;"><col style="width:120px;"><col style="width:50px;">
          <col style="width:38px;"><col style="width:38px;"><col style="width:38px;">
          <col style="width:38px;"><col style="width:38px;"><col style="width:38px;"><col style="width:38px;">
          <col style="width:48px;">
        </colgroup>
        <thead><tr style="border-bottom:1px solid var(--glass-border);">
          <th style="text-align:left;padding:0.3rem 0.4rem;color:var(--text-dim);font-size:0.68rem;">パートナー</th>
          <th style="text-align:left;padding:0.3rem 0.4rem;color:var(--text-dim);font-size:0.68rem;">プロジェクト</th>
          <th style="text-align:center;padding:0.3rem;color:var(--text-dim);font-size:0.68rem;">対象月</th>
          <th style="text-align:center;padding:0.3rem 0;color:#60A5FA;font-size:0.55rem;border-bottom:2px solid #60A5FA;">注文書</th>
          <th style="text-align:center;padding:0.3rem 0;color:#A78BFA;font-size:0.55rem;border-bottom:2px solid #A78BFA;">承諾</th>
          <th style="text-align:center;padding:0.3rem 0;color:#A78BFA;font-size:0.55rem;border-bottom:2px solid #A78BFA;">報告</th>
          <th style="text-align:center;padding:0.3rem 0;color:#60A5FA;font-size:0.55rem;border-bottom:2px solid #60A5FA;">請求書</th>
          <th style="text-align:center;padding:0.3rem 0;color:#60A5FA;font-size:0.55rem;border-bottom:2px solid #60A5FA;">送付</th>
          <th style="text-align:center;padding:0.3rem 0;color:#A78BFA;font-size:0.55rem;border-bottom:2px solid #A78BFA;">承諾</th>
          <th style="text-align:center;padding:0.3rem 0;color:#60A5FA;font-size:0.55rem;border-bottom:2px solid #60A5FA;">支払</th>
          <th style="text-align:center;padding:0.3rem;color:var(--text-dim);font-size:0.68rem;">状態</th>
        </tr></thead>
        <tbody id="pl-tbody"></tbody>
      </table>
    </div>
    <div id="pl-empty" style="display:none;text-align:center;color:var(--text-dim);padding:1.5rem;font-size:0.85rem;">該当するデータがありません</div>
    <div id="pl-detail" style="display:none;margin-top:0.8rem;padding:0.8rem;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);"></div>
  </div>
</div>
{% csrf_token %}
<script>
(function(){
  var D={{ pipeline_data|safe }};
  window._pl={data:D,filtered:D,sf:'pending',sel:null};
  var ms={};D.forEach(function(r){ms[r.work_month]=1;});
  var msel=document.getElementById('pl-filter-month');
  Object.keys(ms).sort().reverse().forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;msel.appendChild(o);});
  filterPL();
})();
function setStF(s){
  window._pl.sf=s;
  document.querySelectorAll('.pl-sb').forEach(function(b){
    var on=b.dataset.s===s;b.style.fontWeight=on?'700':'400';b.style.opacity=on?'1':'0.5';
    b.classList.toggle('pl-sb-on',on);
  });filterPL();
}
function filterPL(){
  var p=document.getElementById('pl-filter-partner').value;
  var m=document.getElementById('pl-filter-month').value;
  var s=window._pl.sf;
  var f=window._pl.data.filter(function(r){
    if(p&&r.partner_name!==p)return false;
    if(m&&r.work_month!==m)return false;
    if(s==='pending'){if(r.row_status==='done')return false;}
    else if(s&&r.row_status!==s)return false;
    return true;
  });
  window._pl.filtered=f;renderPL(f);
}
function selRow(i){
  window._pl.sel=i;
  document.querySelectorAll('#pl-tbody tr').forEach(function(tr,j){tr.style.outline=j===i?'2px solid #6366f1':'none';});
  showDet(i);
}
function showDet(i){
  var panel=document.getElementById('pl-detail');
  var row=window._pl.filtered[i];
  if(!row){panel.style.display='none';return;}
  panel.style.display='block';
  var labels=['注文書作成','注文書承諾','稼働報告受領','請求書作成','請求書送付','支払通知承諾','支払完了'];
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">';
  h+='<div style="font-size:0.85rem;font-weight:600;">'+row.partner_name+' / '+row.project_name+' — '+row.work_month+'</div>';
  h+='<div style="display:flex;gap:0.3rem;">';
  if(row.task_ids.length>0){h+='<button type="button" onclick="event.stopPropagation();bulkDone('+JSON.stringify(row.task_ids)+')" style="background:linear-gradient(135deg,#10B981,#059669);border:none;color:#fff;padding:0.25rem 0.5rem;border-radius:5px;font-size:0.65rem;cursor:pointer;">📋月次タスク完了</button>';}
  if(row.steps[6]&&row.steps[6].status!=='done'){h+='<button type="button" onclick="event.stopPropagation();markPay(\''+row.partner_id+'\',\''+row.project_id+'\',\''+row.work_month_raw+'\')" style="background:linear-gradient(135deg,#818CF8,#6366F1);border:none;color:#fff;padding:0.25rem 0.5rem;border-radius:5px;font-size:0.65rem;cursor:pointer;">💰支払完了</button>';}
  if(row.order_id){h+='<button type="button" onclick="event.stopPropagation();location.href=\'/orders/my/orders/'+row.order_id+'/\'" style="background:rgba(59,130,246,0.15);border:1px solid #3B82F6;color:#3B82F6;padding:0.25rem 0.5rem;border-radius:5px;font-size:0.65rem;cursor:pointer;">📝注文書を見る</button>';}
  h+='<button type="button" onclick="event.stopPropagation();closeDet()" style="background:rgba(148,163,184,0.2);border:none;color:var(--text-dim);padding:0.25rem 0.4rem;border-radius:5px;font-size:0.65rem;cursor:pointer;">✕閉じる</button>';
  h+='</div></div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:0.35rem;">';
  row.steps.forEach(function(s,j){
    var cols={done:'#10B981',active:'#F59E0B',overdue:'#EF4444',pending:'#4B5563'};
    var c=cols[s.status]||'#4B5563';
    var bg=s.status==='done'?'rgba(16,185,129,0.08)':(s.status==='overdue'?'rgba(239,68,68,0.08)':(s.status==='active'?'rgba(245,158,11,0.08)':'rgba(75,85,99,0.06)'));
    var click=s.url?' onclick="location.href=\''+s.url+'\'" style="cursor:pointer;':' style="';
    h+='<div'+click+'flex:1;min-width:85px;padding:0.35rem 0.4rem;border-radius:6px;background:'+bg+';border-left:3px solid '+c+';">';
    h+='<div style="font-size:0.65rem;font-weight:600;color:'+c+';">'+labels[j]+'</div>';
    if(s.deadline)h+='<div style="font-size:0.55rem;color:var(--text-dim);">期限:'+s.deadline+'</div>';
    if(s.days)h+='<div style="font-size:0.55rem;color:'+c+';">'+s.days+'</div>';
    if(s.url)h+='<div style="font-size:0.5rem;color:#818CF8;margin-top:1px;">▶ 作業する</div>';
    if(s.status!=='done'&&s.task_id){
      var skipIds=[s.task_id];
      var skipLabel='⏭スキップ';
      if(j===3){var s4=row.steps[4];if(s4&&s4.task_id&&s4.status!=='done'){skipIds.push(s4.task_id);skipLabel='⏭請求書スキップ';}}
      h+='<div style="margin-top:2px;"><button type="button" onclick="event.stopPropagation();skipTasks('+JSON.stringify(skipIds)+')" style="background:rgba(148,163,184,0.2);border:none;color:#94A3B8;padding:0.1rem 0.3rem;border-radius:3px;font-size:0.5rem;cursor:pointer;">'+skipLabel+'</button></div>';
    }
    h+='</div>';
  });
  h+='</div>';
  panel.innerHTML=h;
}
function closeDet(){document.getElementById('pl-detail').style.display='none';window._pl.sel=null;document.querySelectorAll('#pl-tbody tr').forEach(function(tr){tr.style.outline='none';});}
function plModal(msg,onOk){
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
  var box=document.createElement('div');
  box.style.cssText='background:#1E293B;border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:1.5rem;min-width:320px;max-width:90%;box-shadow:0 20px 40px rgba(0,0,0,0.4);';
  box.innerHTML='<div style="color:#F8FAFC;font-size:0.95rem;margin-bottom:1.2rem;">'+msg+'</div><div style="display:flex;gap:0.5rem;justify-content:flex-end;"><button type="button" id="pl-modal-cancel" style="background:rgba(148,163,184,0.2);border:none;color:#94A3B8;padding:0.4rem 1rem;border-radius:6px;font-size:0.8rem;cursor:pointer;">キャンセル</button><button type="button" id="pl-modal-ok" style="background:linear-gradient(135deg,#4F46E5,#4338CA);border:none;color:#fff;padding:0.4rem 1rem;border-radius:6px;font-size:0.8rem;cursor:pointer;">OK</button></div>';
  box.addEventListener('click',function(e){e.stopPropagation();});
  ov.appendChild(box);document.body.appendChild(ov);
  document.getElementById('pl-modal-ok').addEventListener('click',function(e){e.stopPropagation();e.stopImmediatePropagation();document.body.removeChild(ov);onOk();});
  document.getElementById('pl-modal-cancel').addEventListener('click',function(e){e.stopPropagation();e.stopImmediatePropagation();document.body.removeChild(ov);});
  setTimeout(function(){ov.addEventListener('click',function(e){if(e.target===ov)document.body.removeChild(ov);});},300);
}
function plAlert(msg){
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
  var box=document.createElement('div');
  box.style.cssText='background:#1E293B;border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:1.5rem;min-width:320px;max-width:90%;box-shadow:0 20px 40px rgba(0,0,0,0.4);';
  box.innerHTML='<div style="color:#F8FAFC;font-size:0.95rem;margin-bottom:1.2rem;">'+msg+'</div><div style="display:flex;justify-content:flex-end;"><button type="button" id="pl-alert-ok" style="background:linear-gradient(135deg,#4F46E5,#4338CA);border:none;color:#fff;padding:0.4rem 1rem;border-radius:6px;font-size:0.8rem;cursor:pointer;">OK</button></div>';
  box.addEventListener('click',function(e){e.stopPropagation();});
  ov.appendChild(box);document.body.appendChild(ov);
  document.getElementById('pl-alert-ok').addEventListener('click',function(e){e.stopPropagation();e.stopImmediatePropagation();document.body.removeChild(ov);location.reload();});
  setTimeout(function(){ov.addEventListener('click',function(e){if(e.target===ov){document.body.removeChild(ov);location.reload();}});},300);
}
function bulkDone(ids){
  plModal('この注文の月次タスクを全て完了にしますか？',function(){
    var tk=document.querySelector('[name=csrfmiddlewaretoken]').value;
    fetch('/tasks/bulk-complete/',{method:'POST',headers:{'X-CSRFToken':tk,'Content-Type':'application/json'},body:JSON.stringify({task_ids:ids})})
    .then(function(r){return r.json();}).then(function(d){
      if(d.ok){plAlert(d.count+'件を完了しました');}else{plAlert('エラー: '+(d.error||'不明'));}
    }).catch(function(){plAlert('通信エラー');});
  });
}
function markPay(pid,projId,wm){
  plModal('この注文の支払いを完了にしますか？',function(){
    var tk=document.querySelector('[name=csrfmiddlewaretoken]').value;
    fetch('/tasks/mark-payment-done/',{method:'POST',headers:{'X-CSRFToken':tk,'Content-Type':'application/json'},body:JSON.stringify({partner_id:pid,project_id:projId,work_month:wm})})
    .then(function(r){return r.json();}).then(function(d){
      if(d.ok){plAlert(d.warning||'支払完了にしました');}else{plAlert('エラー: '+(d.error||'不明'));}
    }).catch(function(){plAlert('通信エラー');});
  });
}
function skipTasks(ids){
  plModal('このタスクをスキップ（完了）にしますか？',function(){
    var tk=document.querySelector('[name=csrfmiddlewaretoken]').value;
    fetch('/tasks/bulk-complete/',{method:'POST',headers:{'X-CSRFToken':tk,'Content-Type':'application/json'},body:JSON.stringify({task_ids:ids})})
    .then(function(r){return r.json();}).then(function(d){
      if(d.ok){plAlert(d.count+'件をスキップしました');}else{plAlert('エラー: '+(d.error||'不明'));}
    }).catch(function(){plAlert('通信エラー');});
  });
}
function renderPL(rows){
  rows=rows||window._pl.data;
  var tbody=document.getElementById('pl-tbody'),empty=document.getElementById('pl-empty'),det=document.getElementById('pl-detail');
  det.style.display='none';window._pl.sel=null;
  if(!rows.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  var h='';
  rows.forEach(function(row,ri){
    var bg=row.row_status==='done'?'rgba(16,185,129,0.03)':(row.row_status==='overdue'?'rgba(239,68,68,0.03)':'transparent');
    var bL=row.row_status==='overdue'?'3px solid #EF4444':(row.row_status==='done'?'3px solid #10B981':'3px solid transparent');
    h+='<tr onclick="selRow('+ri+')" style="border-bottom:1px solid rgba(255,255,255,0.04);background:'+bg+';border-left:'+bL+';cursor:pointer;" onmouseover="this.style.background=\'rgba(255,255,255,0.04)\'" onmouseout="this.style.background=\''+bg+'\'">';
    h+='<td style="padding:0.3rem 0.4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;font-size:0.72rem;" title="'+row.partner_name+'">'+row.partner_name+'</td>';
    h+='<td style="padding:0.3rem 0.4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:0.68rem;color:var(--text-dim);" title="'+row.project_name+'">'+row.project_name+'</td>';
    h+='<td style="padding:0.3rem;text-align:center;font-size:0.68rem;color:var(--text-dim);">'+row.work_month+'</td>';
    row.steps.forEach(function(s){
      h+='<td style="text-align:center;padding:0.2rem 0;">';
      var cols={done:'#10B981',active:'#F59E0B',overdue:'#EF4444',pending:'#4B5563'};
      var c=cols[s.status]||'#4B5563';var rsp=s.responsible==='PARTNER'?'P':'自';var tt=s.deadline?'期限:'+s.deadline:'';if(s.days)tt+=(tt?' ':'')+s.days;if(s.responsible)tt+=' ['+(s.responsible==='PARTNER'?'パートナー':'自社')+']';
      if(s.status==='done')h+='<div style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:'+c+';font-size:0.45rem;color:#fff;" title="'+tt+'">✓</div>';
      else if(s.status==='overdue')h+='<div style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:'+c+';font-size:0.5rem;color:#fff;box-shadow:0 0 5px rgba(239,68,68,0.5);" title="'+tt+'">!</div>';
      else if(s.status==='active')h+='<div style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:'+c+';font-size:0.45rem;color:#fff;box-shadow:0 0 4px rgba(245,158,11,0.4);" title="'+tt+'">●</div>';
      else h+='<div style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;border:1.5px solid '+c+';" title="'+tt+'"></div>';
      if(s.days&&s.status!=='done'){var bc=s.status==='overdue'?'rgba(239,68,68,0.2)':(s.status==='active'?'rgba(245,158,11,0.2)':'rgba(148,163,184,0.15)');var tc=s.status==='overdue'?'#EF4444':(s.status==='active'?'#F59E0B':'#94A3B8');h+='<div style="font-size:0.45rem;color:'+tc+';background:'+bc+';border-radius:2px;padding:0 2px;margin-top:1px;white-space:nowrap;line-height:1.3;">'+s.days+'</div>';}
      h+='</td>';
    });
    var bgs={overdue:{b:'rgba(239,68,68,0.15)',c:'#EF4444',t:'遅延'},active:{b:'rgba(245,158,11,0.15)',c:'#F59E0B',t:'進行中'},done:{b:'rgba(16,185,129,0.15)',c:'#10B981',t:'完了'}};
    var bd=bgs[row.row_status]||bgs.active;
    h+='<td style="text-align:center;padding:0.2rem;"><span style="padding:0.1rem 0.3rem;border-radius:8px;font-size:0.55rem;font-weight:600;background:'+bd.b+';color:'+bd.c+';">'+bd.t+'</span></td>';
    h+='</tr>';
  });
  tbody.innerHTML=h;
}
</script>
