{% load i18n %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% trans "2段階認証" %} | EDI Sophia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .verify-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 1rem;
            padding: 2.5rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .verify-card h2 {
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        .verify-card p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .code-input {
            width: 100%;
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 10px;
            padding: 1rem;
            background: #0F172A;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 0.5rem;
            color: white;
            outline: none;
        }
        .code-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.8rem;
            margin-top: 1.5rem;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.5rem;
            padding: 0.75rem;
            margin-bottom: 1.5rem;
            color: #fca5a5;
            font-size: 0.85rem;
        }
        .back-link {
            display: block;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #64748b;
            text-decoration: none;
        }
        .back-link:hover { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="verify-card">
        <h2>🔐 2段階認証</h2>
        <p>認証アプリに表示される6桁のコードを入力してください</p>

        {% if messages %}
        {% for message in messages %}
        <div class="error-msg">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'mfa-totp-verify' %}">
            {% csrf_token %}
            <input type="text" name="code" class="code-input" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" placeholder="000000" required autofocus autocomplete="one-time-code">
            <button type="submit" class="btn">認証する</button>
        </form>

        <a href="{% url 'login' %}" class="back-link">← ログイン画面に戻る</a>
    </div>
</body>
</html>
