{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "削除確認" %}{% endblock %}
{% block content %}
<div class="fade-in">
    <div class="card" style="max-width: 500px; margin: 2rem auto;">
        <h2 style="color: #EF4444; margin-bottom: 1rem;">⚠️ {% trans "削除確認" %}</h2>
        <p>「{{ object }}」{% trans "を削除しますか？この操作は取り消せません。" %}</p>
        <form method="post" style="margin-top: 1.5rem;">
            {% csrf_token %}
            <div class="flex" style="gap: 1rem;">
                <button type="submit" class="btn" style="background: linear-gradient(135deg, #EF4444, #DC2626);">🗑 {%
                    trans "削除" %}</button>
                <a href="javascript:history.back()" class="btn btn-secondary">{% trans "キャンセル" %}</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
