{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "勤怠登録" %} | {% trans "EDIシステム" %}{% endblock %}

{% block content %}
<div class="card fade-in">
    <h2 style="font-family: 'Outfit', sans-serif; margin-bottom: 2rem;">{% trans "勤怠登録" %}</h2>

    <form method="post">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
            <div>
                <label style="display: block; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 0.3rem;">{% trans "受注" %}</label>
                <select name="order_id" style="width: 100%; padding: 0.6rem; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 6px; color: var(--text-main);">
                    <option value="">{% trans "受注なし（給与計算用）" %}</option>
                    {% for o in orders %}
                    <option value="{{ o.pk }}">{{ o.customer.name }} - {{ o.project_name|default:o.order_number }} ({{ o.target_month|date:"Y/m" }})</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="display: block; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 0.3rem;">{% trans "対象月" %} *</label>
                <input type="month" name="target_month" required style="width: 100%; padding: 0.6rem; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 6px; color: var(--text-main);">
            </div>
            <div>
                <label style="display: block; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 0.3rem;">{% trans "作業者名" %} *</label>
                <input type="text" name="worker_name" required style="width: 100%; padding: 0.6rem; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 6px; color: var(--text-main);">
            </div>
            <div>
                <label style="display: block; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 0.3rem;">{% trans "要員種別" %} *</label>
                <select name="worker_type" required style="width: 100%; padding: 0.6rem; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 6px; color: var(--text-main);">
                    <option value="INTERNAL">{% trans "自社社員" %}</option>
                    <option value="PARTNER">{% trans "パートナー" %}</option>
                </select>
            </div>
            <div>
                <label style="display: block; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 0.3rem;">{% trans "合計稼働時間" %} *</label>
                <input type="number" name="total_hours" step="0.25" min="0" required style="width: 100%; padding: 0.6rem; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 6px; color: var(--text-main);">
            </div>
            <div>
                <label style="display: block; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 0.3rem;">{% trans "稼働日数" %}</label>
                <input type="number" name="work_days" min="0" value="0" style="width: 100%; padding: 0.6rem; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 6px; color: var(--text-main);">
            </div>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 1rem;">
            <a href="{% url 'billing:timesheet_list' %}" class="btn btn-secondary" style="text-decoration: none;">{% trans "キャンセル" %}</a>
            <button type="submit" class="btn" style="background: linear-gradient(135deg, #10B981, #059669);">
                <i class="fas fa-save"></i> {% trans "登録" %}
            </button>
        </div>
    </form>
</div>
{% endblock %}
